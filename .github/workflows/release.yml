name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.0.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  ANDROID_NDK_VERSION: "r27d"
  CARGO_ZIGBUILD_VERSION: "0.22.3"
  PROTOC_VERSION: "35.0"
  TERMUX_OPENSSL_VERSION: "3.6.2"
  ZIG_VERSION: "0.16.0"

jobs:
  build-linux:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
      - name: Setup Protoc
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip" -o protoc.zip
          unzip -q protoc.zip -d "${{ runner.temp }}/protoc"
          echo "${{ runner.temp }}/protoc/bin" >> $GITHUB_PATH
          rm protoc.zip
      - name: Setup Zig
        run: |
          curl -fsSL "https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz -C "${{ runner.temp }}"
          echo "${{ runner.temp }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}" >> $GITHUB_PATH
          rm zig.tar.xz
      - name: Setup cargo-zigbuild
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/rust-cross/cargo-zigbuild/releases/download/v${CARGO_ZIGBUILD_VERSION}/cargo-zigbuild-installer.sh | sh
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo zigbuild -p vsd --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -cJf ../../../vsd-${{ inputs.version }}-${{ matrix.target }}.tar.xz ./vsd
      - uses: actions/upload-artifact@v7
        with:
          name: vsd-${{ inputs.version }}-${{ matrix.target }}
          path: vsd-${{ inputs.version }}-${{ matrix.target }}.tar.xz
          if-no-files-found: error

  build-windows:
    name: ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-pc-windows-msvc
          - x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - name: Setup Protoc
        run: |
          curl.exe -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-win64.zip" -o protoc.zip
          Expand-Archive -Path protoc.zip -DestinationPath "${{ runner.temp }}\protoc"
          echo "${{ runner.temp }}\protoc\bin" >> $env:GITHUB_PATH
          Remove-Item protoc.zip
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build -p vsd --release --target ${{ matrix.target }} --no-default-features --features "capture,license,native-tls"
      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../vsd-${{ inputs.version }}-${{ matrix.target }}.zip ./vsd.exe
      - uses: actions/upload-artifact@v7
        with:
          name: vsd-${{ inputs.version }}-${{ matrix.target }}
          path: vsd-${{ inputs.version }}-${{ matrix.target }}.zip
          if-no-files-found: error

  build-macos:
    name: aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Protoc
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-osx-x86_64.zip" -o protoc.zip
          unzip -q protoc.zip -d "${{ runner.temp }}/protoc"
          echo "${{ runner.temp }}/protoc/bin" >> $GITHUB_PATH
          rm protoc.zip
      - name: Add Rust target
        run: rustup target add aarch64-apple-darwin
      - name: Build
        run: cargo build -p vsd --release --target aarch64-apple-darwin --no-default-features --features "capture,license,native-tls"
      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar -cJf ../../../vsd-${{ inputs.version }}-aarch64-apple-darwin.tar.xz ./vsd
      - uses: actions/upload-artifact@v7
        with:
          name: vsd-${{ inputs.version }}-aarch64-apple-darwin
          path: vsd-${{ inputs.version }}-aarch64-apple-darwin.tar.xz
          if-no-files-found: error

  build-android:
    name: aarch64-linux-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Protoc
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip" -o protoc.zip
          unzip -q protoc.zip -d "${{ runner.temp }}/protoc"
          echo "${{ runner.temp }}/protoc/bin" >> $GITHUB_PATH
          rm protoc.zip
      - name: Setup Android NDK
        run: |
          curl -fsSL "https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip" -o ndk.zip
          unzip -q ndk.zip -d "${{ runner.temp }}"
          rm ndk.zip
          echo "${{ runner.temp }}/android-ndk-${{ env.ANDROID_NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
      - name: Setup Termux OpenSSL
        run: |
          curl -fsSL "https://packages.termux.dev/apt/termux-main/pool/main/o/openssl/openssl_1%3A${TERMUX_OPENSSL_VERSION}_aarch64.deb" -o openssl.deb
          mkdir -p "${{ runner.temp }}/openssl-android"
          dpkg-deb -x openssl.deb "${{ runner.temp }}/openssl-android"
          rm openssl.deb
      - name: Add Rust target
        run: rustup target add aarch64-linux-android
      - name: Build
        env:
          OPENSSL_BASE: ${{ runner.temp }}/openssl-android/data/data/com.termux/files/usr
        run: |
          RUSTFLAGS="-C linker=aarch64-linux-android25-clang -C link-args=-Wl,-rpath=/data/data/com.termux/files/usr/lib" \
            AR="llvm-ar" \
            CC="aarch64-linux-android25-clang" \
            CXX="aarch64-linux-android25-clang++" \
            OPENSSL_INCLUDE_DIR="${OPENSSL_BASE}/include" \
            OPENSSL_LIB_DIR="${OPENSSL_BASE}/lib" \
            cargo build -p vsd --release --target aarch64-linux-android \
              --no-default-features --features "license,native-tls"
      - name: Package
        run: |
          cd target/aarch64-linux-android/release
          tar -cJf ../../../vsd-${{ inputs.version }}-aarch64-linux-android.tar.xz ./vsd

      - uses: actions/upload-artifact@v7
        with:
          name: vsd-${{ inputs.version }}-aarch64-linux-android
          path: vsd-${{ inputs.version }}-aarch64-linux-android.tar.xz
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List release archives
        run: ls -lah artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vsd-${{ inputs.version }}
          name: vsd ${{ inputs.version }}
          draft: true
          generate_release_notes: true
          files: artifacts/*
