name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: "35.0"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: vsd
            target: x86_64-unknown-linux-gnu
            protoc_platform: linux-x86_64
          - os: windows-latest
            bin: vsd.exe
            target: x86_64-pc-windows-msvc
            protoc_platform: win64

    steps:
      - uses: actions/checkout@v6
      - name: Setup Protoc
        shell: bash
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-${{ matrix.protoc_platform }}.zip" -o protoc.zip
          unzip -q protoc.zip -d "${{ runner.temp }}/protoc"
          echo "${{ runner.temp }}/protoc/bin" >> $GITHUB_PATH
          rm protoc.zip
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build -p vsd --release --no-default-features --features "capture,license,native-tls"
      - name: Set SHORT_SHA
        shell: bash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: vsd-${{ env.SHORT_SHA }}-${{ matrix.target }}
          path: target/release/${{ matrix.bin }}
